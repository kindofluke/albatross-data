active_model = "dr-claude"
textual_theme = "tokyo-night"
vim_keybindings = false
disable_welcome_banner_animation = false
displayed_workdir = ""
auto_compact_threshold = 200000
context_warnings = false
auto_approve = false
system_prompt_id = "cli"
include_commit_signature = true
include_model_info = true
include_project_context = true
include_prompt_detail = true
enable_update_checks = true
enable_auto_update = true
api_timeout = 720.0
tool_paths = []
mcp_servers = []
enabled_tools = []
disabled_tools = []
agent_paths = []
enabled_agents = []
disabled_agents = []
skill_paths = []
enabled_skills = [
    "skill-creator",
    "pydantic*",
    "ag-ui",
    "tpcds-benchmark", 
    "dataset-manager", 
    "config-optimizer", 
    "build-errors" 
]
disabled_skills = []

[[providers]]
name = "mistral"
api_base = "https://api.mistral.ai/v1"
api_key_env_var = "MISTRAL_API_KEY"
api_style = "openai"
backend = "mistral"
reasoning_field_name = "reasoning_content"

[[providers]]
name = "llamacpp"
api_base = "http://127.0.0.1:8080/v1"
api_key_env_var = ""
api_style = "openai"
backend = "generic"
reasoning_field_name = "reasoning_content"

[[providers]]
name = "openrouter"
api_base = "https://openrouter.ai/api/v1"
api_key_env_var = "OPENROUTER_API_KEY"
api_style = "openai"
backend = "generic"

[[providers]]
name = "openrouter"
api_base = "https://openrouter.ai/api/v1"
api_key_env_var = "OPENROUTER_API_KEY"
api_style = "openai"
backend = "generic"

[[providers]]
name = "datarobot"
api_base = "https://app.datarobot.com/api/v2/genai/llmgw"
api_key_env_var = "DATAROBOT_API_TOKEN"
api_style = "openai"
backend = "generic"

[[models]]
name = "openai/gpt-5.1-codex"
provider = "openrouter"
alias = "codex"
temperature = 0.2
input_price = 0.4
output_price = 2.0

[[models]]
name = "vertex_ai/gemini-3-pro-preview"
provider = "datarobot"
alias = "dr-gemini"
temperature = 0.2
input_price = 0.4
output_price = 2.0

[[models]]
name = "anthropic/claude-sonnet-4-5-20250929"
provider = "datarobot"
alias = "dr-claude"
temperature = 0.2
input_price = 0.4
output_price = 2.0

[[models]]
name = "mistralai/devstral-2512"
provider = "openrouter"
alias = "devstral"
temperature = 0.2
input_price = 0.1
output_price = 0.3

[project_context]
max_chars = 40000
default_commit_count = 5
max_doc_bytes = 32768
truncation_buffer = 1000
max_depth = 3
max_files = 1000
max_dirs_per_level = 20
timeout_seconds = 2.0



[tools.task]
permission = "ask"
allowlist = []
denylist = []

[tools.search_replace]
permission = "ask"
allowlist = []
denylist = []
max_content_size = 100000
create_backup = false
fuzzy_threshold = 0.9

[tools.bash]
permission = "ask"
allowlist = [
    "echo",
    "git diff",
    "git log",
    "git status",
    "tree",
    "whoami",
    "cat",
    "file",
    "head",
    "ls",
    "pwd",
    "stat",
    "tail",
    "uname",
    "wc",
    "which",
]
denylist = [
    "gdb",
    "pdb",
    "passwd",
    "nano",
    "vim",
    "vi",
    "emacs",
    "bash -i",
    "sh -i",
    "zsh -i",
    "fish -i",
    "dash -i",
    "screen",
    "tmux",
]
max_output_bytes = 16000
default_timeout = 300
denylist_standalone = [
    "python",
    "python3",
    "ipython",
    "bash",
    "sh",
    "nohup",
    "vi",
    "vim",
    "emacs",
    "nano",
    "su",
]

[tools.grep]
permission = "always"
allowlist = []
denylist = []
max_output_bytes = 64000
default_max_matches = 100
default_timeout = 60
exclude_patterns = [
    ".venv/",
    "venv/",
    ".env/",
    "env/",
    "node_modules/",
    ".git/",
    "__pycache__/",
    ".pytest_cache/",
    ".mypy_cache/",
    ".tox/",
    ".nox/",
    ".coverage/",
    "htmlcov/",
    "dist/",
    "build/",
    ".idea/",
    ".vscode/",
    "*.egg-info",
    "*.pyc",
    "*.pyo",
    "*.pyd",
    ".DS_Store",
    "Thumbs.db",
]
codeignore_file = ".vibeignore"

[tools.ask_user_question]
permission = "always"
allowlist = []
denylist = []

[tools.read_file]
permission = "always"
allowlist = []
denylist = []
max_read_bytes = 64000
max_state_history = 10

[tools.todo]
permission = "always"
allowlist = []
denylist = []
max_todos = 100

[tools.write_file]
permission = "ask"
allowlist = []
denylist = []
max_write_bytes = 64000
create_parent_dirs = true
